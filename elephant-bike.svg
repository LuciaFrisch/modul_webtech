<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sky background -->
  <rect width="400" height="300" fill="#87CEEB"/>
  
  <!-- Bicycle -->
  <g transform="translate(50,150)">
    <!-- Frame -->
    <path d="M50 50 Q100 30 150 50 L130 80 Q100 70 50 50" fill="#666"/>
    <line x1="150" y1="50" x2="130" y2="80" stroke="#666" stroke-width="3"/>
    
    <!-- Wheels -->
    <circle cx="50" cy="80" r="30" fill="none" stroke="#333" stroke-width="5"/>
    <circle cx="150" cy="80" r="30" fill="none" stroke="#333" stroke-width="5"/>
    
    <!-- Spokes -->
    <line x1="50" y1="80" x2="70" y2="55" stroke="#333"/>
    <line x1="50" y1="80" x2="30" y2="55" stroke="#333"/>
    <line x1="150" y1="80" x2="170" y2="55" stroke="#333"/>
    <line x1="150" y1="80" x2="130" y2="55" stroke="#333"/>
    
    <!-- Pedals -->
    <circle cx="100" cy="80" r="10" fill="#666"/>
  </g>
  
  <!-- Elephant -->
  <g transform="translate(100,100)">
    <!-- Body -->
    <path d="M50 100 Q75 80 100 100 Q110 120 90 130 L60 140 Q40 130 50 100" fill="#999"/>
    
    <!-- Head -->
    <path d="M100 100 Q120 90 130 110 Q125 130 110 135 L100 130 Q95 120 100 100" fill="#999"/>
    
    <!-- Trunk -->
    <path d="M130 110 Q135 100 140 105 Q138 115 135 120 L130 118 Z" fill="#999"/>
    
    <!-- Ear -->
    <path d="M110 90 Q105 80 115 75 Q125 85 110 90" fill="#999"/>
    
    <!-- Eye -->
    <circle cx="120" cy="115" r="2" fill="black"/>
    
    <!-- Tail -->
    <path d="M40 130 Q30 125 25 135 Q35 140 40 130" fill="#999"/>
  </g>
  
  <!-- Saddle -->
  <path d="M210 130 L230 125 Q235 130 230 135 Z" fill="#663300"/>
  
  <!-- Handlebars -->
  <path d="M230 125 L250 110 M230 125 L210 110" stroke="#666" stroke-width="3"/>
</svg>
